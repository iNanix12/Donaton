spring.application.name=logistica

# ═══════════════════════════════════════════════════════════════
# Donaton - Microservicio de Logistica
# Puerto: 8087
# ═══════════════════════════════════════════════════════════════

# ── Servidor ────────────────────────────────────────────────────
server.port=8087


# ── Base de Datos PostgreSQL ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/db_logistica
spring.datasource.username=postgres
spring.datasource.password=animacion12
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones (HikariCP - default en Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
 
# ── Comunicación con microservicio de Donaciones (WebClient) ──────
donacion.service.base-url=http://localhost:8086
# ── Logging ──────────────────────────────────────────────────────
logging.level.com.donaton=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ── Actuator (monitoreo) ─────────────────────────────────────────
#management.endpoints.web.exposure.include=health,info,metrics
#management.endpoint.health.show-details=always