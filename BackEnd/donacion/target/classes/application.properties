# ═══════════════════════════════════════════════════════════════
# Donaton - Microservicio de Donaciones
# Puerto: 8086
# ═══════════════════════════════════════════════════════════════

# ── Servidor ────────────────────────────────────────────────────
server.port=8086
spring.application.name=donacion-service

# ── Base de Datos PostgreSQL ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/db_donaciones
spring.datasource.username=postgres
spring.datasource.password=animacion12
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones (HikariCP - default en Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────────────────
# validate: Hibernate valida el esquema pero NO lo modifica (recomendado en producción)
# update:   Hibernate crea/altera tablas automáticamente (solo para desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Nombre de las tablas en minúsculas con snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.donaton=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ── Actuator (monitoreo) ─────────────────────────────────────────
#management.endpoints.web.exposure.include=health,info,metrics
#management.endpoint.health.show-details=always